<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'nonce-{{NONCE}}';">
    <title>CommitLens Review Panel</title>
    <style>{{CSS_CONTENT}}</style>
</head>
<body>
    <div class="header">
        <div style="display: flex; align-items: center; gap: 10px;">
            <h2 style="margin: 0;">Overview</h2>
            <button id="refresh-btn" style="background:transparent;border:none;padding:4px 8px;cursor:pointer;color:var(--vscode-icon-foreground);display:flex;align-items:center;justify-content:center;border-radius:4px;opacity:0.8;" title="Refresh Git Changes" onmouseover="this.style.background='var(--vscode-toolbar-hoverBackground)';this.style.opacity='1'" onmouseout="this.style.background='transparent';this.style.opacity='0.8'">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
            </button>
        </div>
        <div id="profile" class="profile-container" style="display: {{DISPLAY_PROFILE}};">
            <div class="profile-icon" id="profile-initial" style="background:transparent; border: 1px solid var(--vscode-button-background);">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </div>
            <div class="profile-menu" id="profile-menu">
                <div class="profile-name" id="profile-name">Connected as {{INITIAL_USERNAME}}</div>
                <div class="menu-item" id="api-key-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path></svg>
                    Update API Key
                </div>
                <div class="menu-item" id="model-id-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                    Update Model ID
                </div>
                <div class="menu-divider"></div>
                <div class="menu-item" id="logout-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    Logout
                </div>
            </div>
        </div>
    </div>

    <div id="login-screen" class="screen" style="display: {{DISPLAY_LOGIN}}; align-items: center; justify-content: center; text-align: center;">
        <h3 style="margin-bottom: 10px;">Welcome to CommitLens</h3>
        <p style="opacity: 0.8; max-width: 300px; margin-bottom: 20px;">Connect your GitHub account to access the AI reviewer.</p>
        <button id="login-btn">Login with GitHub</button>
    </div>

    <div id="main-screen" class="screen" style="display: {{DISPLAY_MAIN}};">
        <div class="branch-info">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px; vertical-align: text-bottom;"><line x1="6" y1="3" x2="6" y2="15"></line><circle cx="18" cy="6" r="3"></circle><circle cx="6" cy="18" r="3"></circle><path d="M18 9a9 9 0 0 1-9 9"></path></svg> Branch: <strong id="branch-name">main</strong>
        </div>

        <div id="staged-container" style="display: none;">
            <div class="section-header" id="staged-header">
                <span id="staged-chevron" style="transition: transform 0.2s; font-size: 10px;">▼</span>
                Staged Changes <span class="badge-count" id="staged-count">0</span>
            </div>
            <div class="file-list" id="staged-list"></div>
        </div>

        <div id="unstaged-container" style="display: none;">
            <div class="section-header" id="unstaged-header">
                <span id="unstaged-chevron" style="transition: transform 0.2s; font-size: 10px;">▼</span>
                Unstaged Changes <span class="badge-count" id="unstaged-count">0</span>
            </div>
            <div class="file-list" id="unstaged-list"></div>
        </div>

        <div id="empty-state" style="display: none; padding: 40px; text-align: center; opacity: 0.6;">
            No modified files found.
        </div>

        <button class="trigger-btn" id="trigger-btn">Trigger Review</button>
        <div id="result"></div>
    </div>

    <!-- Choice Modal -->
    <div class="modal-backdrop" id="modal-backdrop"></div>
    <div class="modal" id="choice-modal">
        <h3 style="margin: 0 0 10px 0;">What to review?</h3>
        <button id="review-staged-btn">Review Staged Changes</button>
        <button id="review-unstaged-btn" class="secondary-btn">Review Unstaged Changes</button>
    </div>

    <script nonce="{{NONCE}}">{{JS_CONTENT}}</script>
</body>
</html>
